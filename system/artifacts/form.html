<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>博瑞蓝 — 表单</title>
  <style>
:root {
    --color-primary: #2C7CF5;
    --color-primary-hover: #4091F9;
    --color-primary-light: #EBF3FF;
    --color-primary-bg: #ECF7FF;
    --color-primary-active: #0A64EA;
    --color-success: #00D6A5;
    --color-warning: #FAAD14;
    --color-danger: #FF5959;
    --bg-page: #F2F5F9;
    --bg-surface: #FFFFFF;
    --bg-overlay: rgba(0, 0, 0, 0.5);
    --bg-input: #FFFFFF;
    --text-heading: #000000;
    --text-body: #4A4A4A;
    --text-secondary: #666666;
    --text-hint: #BDBDBD;
    --text-label: #999999;
    --border-color: #E5E9F0;
    --border-color-hover: #2C7CF5;
    --font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Roboto, "Segoe UI", Arial, sans-serif;
    --font-mono: "SF Mono", SFMono-Regular, "JetBrains Mono", Menlo, Consolas, monospace;
    --radius-sm: 4px;
    --radius-base: 12px;
    --radius-lg: 16px;
    --radius-round: 999px;
    --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
    --shadow-base: 0 2px 8px rgba(0, 0, 0, 0.15);
    --shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.18);
    --transition-base: 0.2s ease;
}
:root {
  --od-page-bg: #F2F5F9;
  --od-surface: #FFFFFF;
  --od-text: #000000;
  --od-muted: #666666;
  --od-border: #E5E9F0;
  --od-accent: #2C7CF5;
  --od-radius: 12px;
  --od-font-body: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Roboto, "Segoe UI", Arial, sans-serif;
  --od-font-display: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Roboto, "Segoe UI", Arial, sans-serif;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  background: var(--od-page-bg);
  color: var(--od-text);
  font-family: var(--od-font-body);
  -webkit-font-smoothing: antialiased;
}
a { color: inherit; }
.page { width: min(1100px, calc(100vw - 48px)); margin: 0 auto; padding: 72px 0; }
.eyebrow { color: var(--od-accent); font-size: 12px; font-weight: 600; letter-spacing: 0; text-transform: uppercase; }
.hero { display: grid; grid-template-columns: 1.05fr .95fr; gap: 32px; align-items: center; }
h1, h2, h3, p { margin: 0; }
h1, h2, h3 { font-family: var(--od-font-display); letter-spacing: 0; line-height: 1.2; }
h1 { margin-top: 12px; font-size: 56px; font-weight: 600; }
h2 { font-size: 36px; }
h3 { font-size: 20px; font-weight: 600; }
.lead { margin-top: 18px; color: var(--od-muted); font-size: 18px; line-height: 1.55; }
.actions { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 28px; }
.button { display: inline-flex; min-height: 44px; align-items: center; justify-content: center; border-radius: var(--od-radius); padding: 0 18px; font-weight: 600; text-decoration: none; border: 1px solid var(--od-border); }
.button.primary { background: var(--od-accent); border-color: var(--od-accent); color: #ffffff; }
.button.secondary { background: var(--od-surface); }
.panel, .card, .field, .slide, .email, .poster { border: 1px solid var(--od-border); border-radius: var(--od-radius); background: var(--od-surface); }
.panel { padding: 24px; box-shadow: 0 24px 80px rgba(15, 17, 23, 0.08); }
.metric-grid, .card-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; margin-top: 22px; }
.metric, .card { padding: 18px; }
.metric strong { display: block; font-size: 30px; line-height: 1; }
.metric span, .card p, .field span { color: var(--od-muted); font-size: 14px; line-height: 1.5; }
.chip-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 18px; }
.chip { border: 1px solid var(--od-border); border-radius: 999px; padding: 8px 12px; color: var(--od-muted); }
input, textarea, select { width: 100%; min-height: 44px; border: 1px solid var(--od-border); border-radius: var(--od-radius); background: var(--od-page-bg); color: var(--od-text); font: inherit; padding: 10px 12px; }
label { display: grid; gap: 8px; color: var(--od-muted); font-size: 13px; font-weight: 600; }
@media (max-width: 820px) { .hero, .metric-grid, .card-grid { grid-template-columns: 1fr; } .page { width: min(100vw - 28px, 1100px); padding: 40px 0; } h1 { font-size: 36px; } h2 { font-size: 26px; } }
</style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div>
        <p class="eyebrow">Form module</p>
        <h1>博瑞蓝 数据采集</h1>
        <p class="lead">输入框、选择器、辅助文本和提交状态，集中在一个页面中。</p>
        <div class="actions">
          <a class="button primary" href="#">立即体验</a>
          <a class="button secondary" href="#">查看详情</a>
        </div>
      </div>
      <article class="panel">
        <p class="eyebrow">Preview</p>
        <h3>表单页面</h3>
        <p class="lead" style="font-size:16px">JoinBright-Blue Open Design 物料包，基于 DESIGN.md、tokens.css 与 components.html 组合生成。</p>
        <div class="card-grid" style="grid-template-columns:1fr 1fr">
          <div class="field"><label>主输入<input value="博瑞蓝" /></label></div>
          <div class="field"><label>状态<select><option>就绪</option><option>草稿</option></select></label></div>
        </div>
      </article>
    </section>
  </main>
</body>
</html>
